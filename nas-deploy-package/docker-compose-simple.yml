services:
  pdf-extractor:
    build: .
    container_name: pdf-extractor
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /volume1/docker/pdf-extractor/data:/tmp/extracted
      - /volume1/docker/pdf-extractor/temp:/tmp/pdfs
      - /volume1/docker/pdf-extractor:/app
    environment:
      - NODE_ENV=production
      - PORT=5000
