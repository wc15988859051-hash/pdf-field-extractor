version: '3.8'

services:
  pdf-extractor:
    build: .
    container_name: pdf-extractor
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # 持久化数据目录
      - pdf-data:/tmp/extracted
      - pdf-temp:/tmp/pdfs
    environment:
      - NODE_ENV=production
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pdf-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/pdf-extractor/data

  pdf-temp:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /volume1/docker/pdf-extractor/temp

networks:
  default:
    name: pdf-extractor-network
