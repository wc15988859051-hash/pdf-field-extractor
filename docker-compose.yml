# ==============================================
# PDF 字段提取应用 - Docker Compose 配置
# 用于极空间 NAS Docker 部署
# ==============================================

version: '3.8'

services:
  pdf-extractor:
    # 容器名称
    container_name: pdf-extractor-app
    
    # 构建配置 - 使用当前目录的 Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    
    # 镜像名称（可选，方便后续引用）
    image: pdf-extractor:latest
    
    # 端口映射 - 将容器的 5000 端口映射到主机的 5000 端口
    ports:
      - "5000:5000"
    
    # 环境变量配置
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      # 可在此添加其他环境变量，如：
      # - COZE_API_KEY=your_coze_api_key_here
    
    # 数据卷挂载 - 持久化存储
    volumes:
      # 挂载临时文件目录，确保数据不丢失
      - pdf-temp:/tmp/pdfs
      - pdf-extracted:/tmp/extracted
      # 如果需要，可以挂载日志目录
      # - ./logs:/app/work/logs
    
    # 重启策略 - 容器退出时自动重启
    restart: unless-stopped
    
    # 资源限制（可选，根据 NAS 配置调整）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    
    # 健康检查（可选）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 定义数据卷
volumes:
  pdf-temp:
    driver: local
  pdf-extracted:
    driver: local
