version: '3.8'

services:
  pdf-field-extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-field-extractor
    ports:
      - "5000:5000"
    environment:
      # Node.js 环境
      - NODE_ENV=production
      - PORT=5000

      # Coze API 配置
      - COZE_API_KEY=${COZE_API_KEY}
      - COZE_BASE_URL=${COZE_BASE_URL}
      - COZE_BOT_ID=${COZE_BOT_ID}
    volumes:
      # 持久化临时文件（可选）
      - pdf-temp:/tmp
    restart: unless-stopped
    networks:
      - pdf-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pdf-temp:
    driver: local

networks:
  pdf-network:
    driver: bridge
