version: '3.8'

services:
  pdf-field-extractor:
    # 极空间部署配置
    # 根据你的极空间架构选择 Dockerfile
    # x86_64 架构: 使用 Dockerfile
    # ARM64 架构: 使用 Dockerfile.nas
    build:
      context: .
      dockerfile: Dockerfile.nas  # 如果是 x86_64，改为 Dockerfile
    container_name: pdf-field-extractor
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - TZ=Asia/Shanghai  # 设置时区
    volumes:
      # 数据持久化（可选）
      - ./data:/tmp
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.zima.description=PDF Field Extractor Application"
      - "com.zima.service=pdf-field-extractor"
